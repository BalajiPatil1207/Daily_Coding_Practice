<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Explorer JS</title>
    <style>
        #container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .card{
            width: 400px;
            padding: 20px;
            border: 1px solid #f56363;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-family: sans-serif;
        }
        .card h3{
            margin:0;
        }
        .card p{
            font-size: 14px;
            color: gray;
        }
    </style>
</head>
<body>
    <h1>API Explorer JS</h1>
    <button id="fetchBtn">Get Data</button>
    <button id="hiddenBtn">hiden</button>

    <div id="container"></div>
    
     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
